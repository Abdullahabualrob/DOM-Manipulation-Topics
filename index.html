<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ToDo App JS Only</title>
</head>
<body>
<script>
  const faLink = document.createElement("link");
  faLink.rel = "stylesheet";
  faLink.href = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css";
  document.head.appendChild(faLink);
  const body = document.body;
  body.style.fontFamily = "Arial, sans-serif";
  body.style.backgroundColor = "#f4f4f4";
  body.style.textAlign = "center";
  body.style.padding = "20px";

 const title = document.createElement("h1");
  title.textContent = "TodoInput";
  title.style.marginBottom = "20px";
  title.style.fontSize = "32px";
  title.style.fontWeight = "bold";
    body.appendChild(title);
  const divheader = document.createElement("div");
  Object.assign(divheader.style, {
    border: "1px solid #ccc",
    padding: "20px",
    backgroundColor: "#fff",
    borderRadius: "8px",
    width: "80%",
    margin: "auto",
    boxShadow: "0 2px 5px rgba(0,0,0,0.1)",
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    gap: "10px"
  });
  const inputRow = document.createElement("div");
  Object.assign(inputRow.style, {
    display: "flex",
    alignItems: "center",
    width: "100%"
  });
    const icon = document.createElement("i");
  icon.className = "fa-solid fa-book";
  Object.assign(icon.style, {
    fontSize: "18px",
    color: "white",
    backgroundColor: "#0097b2",
    padding: "10px",
    borderTopLeftRadius: "5px",
    borderBottomLeftRadius: "5px"
  });

  const input = document.createElement("input");
  input.id = "taskInput";
 Object.assign(input.style, {
    padding: "10px",
    fontSize: "16px",
    width: "100%",
    border: "1px solid #ccc",
    borderLeft: "none",
    borderTopRightRadius: "5px",
    borderBottomRightRadius: "5px"
  });
const errorMsg = document.createElement("div");
  errorMsg.style.color = "red";
  errorMsg.style.fontSize = "14px";
  errorMsg.style.marginTop = "5px";
  errorMsg.style.display = "none";

  divheader.appendChild(errorMsg);
 const validateInput = (text) => {
    if (!text.trim()) {
      return "Task cannot be empty.";
    }
    if (!isNaN(text.trim()[0])) {
      return "Task cannot start with a number.";
    }
    if (text.trim().length < 5) {
      return "Task must be at least 5 characters.";
    }
    return null;
  };
inputRow.appendChild(icon);
inputRow.appendChild(input);
  const addButton = document.createElement("button");
  addButton.textContent = "Add new task";
 Object.assign(addButton.style, {
    padding: "10px",
    backgroundColor: "#0097b2",
    color: "white",
    border: "none",
    cursor: "pointer",
    width: "100%",
    fontSize: "16px",
    borderRadius: "5px"
  });

  divheader.appendChild(inputRow);
  divheader.appendChild(addButton);
  body.appendChild(divheader);
  const title2 = document.createElement("h2");
  title2.textContent = "Todo List";
title2.style.marginTop = "30px";
  title2.style.fontWeight = "bold";
  body.appendChild(title2);






</script>



</body>
